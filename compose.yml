services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-precios_pe}
      POSTGRES_USER: ${POSTGRES_USER:-preciospe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-preciospe} -d ${POSTGRES_DB:-precios_pe}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-preciospe}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-precios_pe}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      CREDENTIALS_SECRET_KEY: ${CREDENTIALS_SECRET_KEY:?CREDENTIALS_SECRET_KEY is required}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-Admin12345!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_BROADCAST_CHAT_ID: ${TELEGRAM_BROADCAST_CHAT_ID:?TELEGRAM_BROADCAST_CHAT_ID is required}
      TELEGRAM_BROADCAST_INVITE_URL: ${TELEGRAM_BROADCAST_INVITE_URL:?TELEGRAM_BROADCAST_INVITE_URL is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
      MIN_MARGIN_PERCENT: ${MIN_MARGIN_PERCENT:-15}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-3}
      DELTRON_USER: ${DELTRON_USER:-}
      DELTRON_PASS: ${DELTRON_PASS:-}
      INGRAM_USER: ${INGRAM_USER:-}
      INGRAM_PASS: ${INGRAM_PASS:-}
      INTCOMEX_USER: ${INTCOMEX_USER:-}
      INTCOMEX_PASS: ${INTCOMEX_PASS:-}
    ports:
      - ${APP_PORT:-3308}:3000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    command: ["bash", "docker/start-app.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-preciospe}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-precios_pe}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      CREDENTIALS_SECRET_KEY: ${CREDENTIALS_SECRET_KEY:?CREDENTIALS_SECRET_KEY is required}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-Admin12345!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_BROADCAST_CHAT_ID: ${TELEGRAM_BROADCAST_CHAT_ID:?TELEGRAM_BROADCAST_CHAT_ID is required}
      TELEGRAM_BROADCAST_INVITE_URL: ${TELEGRAM_BROADCAST_INVITE_URL:?TELEGRAM_BROADCAST_INVITE_URL is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
      MIN_MARGIN_PERCENT: ${MIN_MARGIN_PERCENT:-15}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-3}
      DELTRON_USER: ${DELTRON_USER:-}
      DELTRON_PASS: ${DELTRON_PASS:-}
      INGRAM_USER: ${INGRAM_USER:-}
      INGRAM_PASS: ${INGRAM_PASS:-}
      INTCOMEX_USER: ${INTCOMEX_USER:-}
      INTCOMEX_PASS: ${INTCOMEX_PASS:-}
    command: ["bash", "docker/start-worker.sh"]

volumes:
  postgres-data: